<head>

<!-- PWA -->
<meta name="mobile-web-app-capable" content="yes">

<script>
(function(){
  function makeIcon(size){
    const c=document.createElement('canvas'); c.width=c.height=size;
    const x=c.getContext('2d');
    x.fillStyle='#000'; x.fillRect(0,0,size,size);
    const cx=size/2,cy=size/2,r=size*.44;
    ['#c8ff00','#cc88ff','#ffaa44','#44ddff'].forEach((col,i)=>{
      const a=(Math.PI/2)*i,b=a+Math.PI/2;
      x.beginPath(); x.moveTo(cx,cy); x.arc(cx,cy,r,a,b); x.closePath();
      x.fillStyle=col; x.fill();
    });
    x.beginPath(); x.arc(cx,cy,r,0,Math.PI*2);
    x.strokeStyle='rgba(255,255,255,0.4)'; x.lineWidth=size*.03; x.stroke();
    x.beginPath(); x.arc(cx,cy,r*.13,0,Math.PI*2); x.fillStyle='#fff'; x.fill();
    return c.toDataURL('image/png');
  }
  const iconObjs=[192,512].map(s=>({src:makeIcon(s),sizes:`${s}x${s}`,type:'image/png'}));
  const blob=new Blob([JSON.stringify({name:'Gira la Ruleta',short_name:'Ruleta',start_url:'./',display:'standalone',background_color:'#000',theme_color:'#000',orientation:'portrait',icons:iconObjs})],{type:'application/json'});
  const lm=document.createElement('link'); lm.rel='manifest'; lm.href=URL.createObjectURL(blob);
  const la=document.createElement('link'); la.rel='apple-touch-icon'; la.href=iconObjs[0].src;
  document.currentScript.after(lm,la);
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--tierra:#c8ff00;--aire:#cc88ff;--fuego:#ffaa44;--agua:#44ddff;}

html,body{
  width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Poppins',sans-serif;touch-action:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;}

/* ── canvases ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#fxCanvas,#confettiCanvas{position:fixed;inset:0;pointer-events:none;}
#fxCanvas{z-index:2;} #confettiCanvas{z-index:3;}
#flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:10;transition:opacity .06s;}

/* ── layout ── */
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}

/* ── wheel ── */
.wheel-wrapper{
  position:relative;
  /* fills most of the screen, leaving room for button below */
  width:min(520px, 92vw, calc(100vh - 160px));
  height:min(520px, 92vw, calc(100vh - 160px));
  margin-bottom:28px;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
}
.wheel-wrapper:active{cursor:grabbing;}

.rays{
  position:absolute;inset:-24px;border-radius:50%;pointer-events:none;z-index:-1;
  background:conic-gradient(
    rgba(200,255,0,.2) 0deg,rgba(0,0,0,0) 45deg,
    rgba(204,136,255,.2) 90deg,rgba(0,0,0,0) 135deg,
    rgba(255,170,68,.2) 180deg,rgba(0,0,0,0) 225deg,
    rgba(68,221,255,.2) 270deg,rgba(0,0,0,0) 315deg,
    rgba(200,255,0,.2) 360deg
  );
  opacity:0;transition:opacity .4s;animation:raysRot 3s linear infinite;
}
.rays.active{opacity:1;}
@keyframes raysRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.wheel-glow{
  position:absolute;inset:-10px;border-radius:50%;
  border:3px solid rgba(255,255,255,.12);pointer-events:none;
  animation:ringPulse 2.5s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{box-shadow:0 0 20px rgba(255,255,255,.05)}50%{box-shadow:0 0 80px rgba(255,255,255,.22)}}

/* drag hint ring */
.drag-hint{
  position:absolute;inset:-3px;border-radius:50%;
  border:2px dashed rgba(255,255,255,.18);pointer-events:none;
  animation:hintSpin 12s linear infinite;opacity:.6;
}
@keyframes hintSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

#wheelCanvas{width:100%;height:100%;border-radius:50%;display:block;}

.pointer{
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:20px solid transparent;border-right:20px solid transparent;border-top:42px solid #fff;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.9));z-index:10;
  animation:pointerBob 1.8s ease-in-out infinite;
}
@keyframes pointerBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.pointer.tick{
  filter:drop-shadow(0 0 28px #fff) drop-shadow(0 0 10px #ffaa44)!important;
  transform:translateX(-50%) scale(1.35)!important;
}

.center-dot{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:26px;height:26px;background:#fff;border-radius:50%;z-index:10;
  box-shadow:0 0 20px rgba(255,255,255,.9),0 0 55px rgba(255,255,255,.4);
  animation:dotPulse 1.5s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 20px rgba(255,255,255,.9),0 0 55px rgba(255,255,255,.3)}
  50%{box-shadow:0 0 38px rgba(255,255,255,1),0 0 100px rgba(255,255,255,.6)}
}

/* swipe hint label */
.swipe-hint{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:.7rem;font-weight:300;color:rgba(255,255,255,.35);
  letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;
  pointer-events:none;animation:fadeHint 3s ease-in-out 1s both;
}
@keyframes fadeHint{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* ── button ── */
.spin-btn{
  position:relative;padding:16px 56px;border:none;border-radius:100px;
  font-family:'Poppins',sans-serif;font-size:1.05rem;font-weight:400;color:#000;
  cursor:pointer;letter-spacing:.04em;overflow:hidden;
  background:linear-gradient(135deg,var(--tierra) 0%,var(--agua) 33%,var(--aire) 66%,var(--fuego) 100%);
  background-size:300% 300%;animation:gradShift 4s ease infinite;
  transition:transform .2s,box-shadow .2s;
}
.spin-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);background-size:200% 100%;background-position:200% 0;transition:background-position .5s;}
.spin-btn:hover::after{background-position:-200% 0;}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.spin-btn:hover:not(:disabled){transform:scale(1.07) translateY(-2px);box-shadow:0 12px 45px rgba(200,255,0,.5);}
.spin-btn:active:not(:disabled){transform:scale(.96);}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;animation:none;}

/* ── legend ── */
.legend{display:flex;gap:16px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.45);font-size:.75rem;font-weight:300;letter-spacing:.05em;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ── result overlay ── */
#resultOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:200;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(16px);}
#resultOverlay.show{display:flex;}

.result-card{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:44px 60px;border-radius:32px;background:rgba(8,8,8,.93);
  animation:cardPop .6s cubic-bezier(.175,.885,.32,1.275) forwards;overflow:hidden;
}
.result-card::before{content:'';position:absolute;inset:-3px;border-radius:35px;z-index:-1;background:conic-gradient(var(--cc,#fff) 0deg,transparent 60deg,transparent 150deg,var(--cc,#fff) 210deg,transparent 270deg,transparent 360deg);animation:borderSpin 1.8s linear infinite;}
.result-card::after{content:'';position:absolute;inset:0;border-radius:32px;background:rgba(8,8,8,.93);z-index:-1;}
@keyframes borderSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes cardPop{from{opacity:0;transform:scale(.25) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}

.result-icon-wrap{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;}
.result-icon-bg{position:absolute;inset:0;border-radius:50%;animation:ibPulse 1s ease-in-out infinite alternate;}
@keyframes ibPulse{from{opacity:.3;transform:scale(.88)}to{opacity:.75;transform:scale(1.12)}}
#resultIcon{position:relative;font-size:5rem;z-index:1;animation:iconBounce .7s cubic-bezier(.175,.885,.32,1.275) .1s both,iconFloat 2s .8s ease-in-out infinite;}
@keyframes iconBounce{from{opacity:0;transform:scale(0) rotate(-25deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes iconFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.1)}}
.orbit-ring{position:absolute;inset:-12px;border-radius:50%;}
.result-element-name{font-size:2.6rem;font-weight:700;color:#fff;letter-spacing:.05em;animation:textUp .5s .3s both;}
.result-element-sub{font-size:.82rem;font-weight:300;color:rgba(255,255,255,.42);letter-spacing:.2em;text-transform:uppercase;animation:textUp .5s .45s both;}
@keyframes textUp{from{opacity:0;transform:translateY(24px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.result-close{margin-top:10px;padding:12px 34px;border:1px solid rgba(255,255,255,.2);border-radius:100px;background:transparent;color:#fff;font-family:'Poppins',sans-serif;font-weight:400;font-size:.92rem;cursor:pointer;letter-spacing:.05em;transition:background .2s,border-color .2s,transform .1s;animation:textUp .5s .6s both;}
.result-close:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.5);transform:scale(1.04);}

@keyframes shake{0%{transform:translate(0,0)}15%{transform:translate(-8px,5px)}30%{transform:translate(8px,-5px)}45%{transform:translate(-6px,4px)}60%{transform:translate(6px,-3px)}75%{transform:translate(-3px,2px)}90%{transform:translate(3px,-1px)}100%{transform:translate(0,0)}}
.shaking{animation:shake .5s ease both;}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>
<div id="flash"></div>

<div class="page">
  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="rays" id="rays"></div>
    <div class="wheel-glow"></div>
    <div class="drag-hint"></div>
    <div class="pointer" id="pointer"></div>
    <canvas id="wheelCanvas" width="900" height="900"></canvas>
    <div class="center-dot"></div>
    <div class="swipe-hint">↺ &nbsp; arrastra para girar</div>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spinAuto()">Gira la ruleta</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c8ff00;box-shadow:0 0 6px #c8ff00"></div>Tierra</div>
    <div class="legend-item"><div class="legend-dot" style="background:#cc88ff;box-shadow:0 0 6px #cc88ff"></div>Aire</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffaa44;box-shadow:0 0 6px #ffaa44"></div>Fuego</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44ddff;box-shadow:0 0 6px #44ddff"></div>Agua</div>
  </div>
</div>

<div id="resultOverlay">
  <div class="result-card" id="resultCard">
    <div class="result-icon-wrap">
      <div class="result-icon-bg" id="resultIconBg"></div>
      <canvas class="orbit-ring" id="orbitCanvas" width="174" height="174"></canvas>
      <span id="resultIcon">🌿</span>
    </div>
    <div class="result-element-name" id="resultName">Tierra</div>
    <div class="result-element-sub" id="resultSub">Elemento de la naturaleza</div>
    <button class="result-close" onclick="closeResult()">¡Volver a girar!</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// SEGMENTS
// ═══════════════════════════════════════
const SEG=[
  {name:'Tierra',color:'#c8ff00',icon:'🌿',desc:'Elemento de la naturaleza'},
  {name:'Aire',  color:'#cc88ff',icon:'🌬️',desc:'Elemento del viento libre'},
  {name:'Fuego', color:'#ffaa44',icon:'🔥',desc:'Elemento de la pasión'},
  {name:'Agua',  color:'#44ddff',icon:'💧',desc:'Elemento de la fluidez'},
];

// ═══════════════════════════════════════
// BG PARTICLES
// ═══════════════════════════════════════
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
let bgW=0,bgH=0;
const BGCOLS=['#c8ff0038','#cc88ff38','#ffaa4438','#44ddff38','#ffffff22'];
const bgPts=Array.from({length:100},()=>({
  x:Math.random()*3000,y:Math.random()*1500,r:.5+Math.random()*2.8,
  vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,
  col:BGCOLS[Math.floor(Math.random()*BGCOLS.length)],
  ph:Math.random()*Math.PI*2,spd:.3+Math.random()*1.2
}));
function resizeBg(){bgW=bgC.width=innerWidth;bgH=bgC.height=innerHeight;}
resizeBg();addEventListener('resize',resizeBg);
function drawBg(t){
  bgX.clearRect(0,0,bgW,bgH);
  bgPts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgW;if(p.x>bgW)p.x=0;
    if(p.y<0)p.y=bgH;if(p.y>bgH)p.y=0;
    const a=.2+.8*Math.abs(Math.sin(t*.001*p.spd+p.ph));
    bgX.save();bgX.globalAlpha=a;
    bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);bgX.fillStyle=p.col;bgX.fill();
    bgX.globalAlpha=a*.25;bgX.beginPath();bgX.arc(p.x,p.y,p.r*3.5,0,Math.PI*2);bgX.fillStyle=p.col;bgX.fill();
    bgX.restore();
  });
}

// ═══════════════════════════════════════
// FX CANVAS
// ═══════════════════════════════════════
const fxC=document.getElementById('fxCanvas'),fxX=fxC.getContext('2d');
let fxW=0,fxH=0,fxPts=[],waves=[];
function resizeFx(){fxW=fxC.width=innerWidth;fxH=fxC.height=innerHeight;}
resizeFx();addEventListener('resize',resizeFx);

function addWave(x,y,col){waves.push({x,y,r:0,max:Math.min(fxW,fxH)*.62,col,life:1});}
function spawnSparks(x,y,col,n=70){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=3+Math.random()*13;
    fxPts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:1.5+Math.random()*4,col,life:1,decay:.012+Math.random()*.022,trail:[]});
  }
}
function spawnStars(x,y,col,n=50){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i,sp=3+Math.random()*9;
    fxPts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:2+Math.random()*4,col,life:1,decay:.008+Math.random()*.015,trail:[]});
  }
}
function spawnRings(x,y,col){
  addWave(x,y,col);
  setTimeout(()=>addWave(x,y,'#fff'),200);
  setTimeout(()=>addWave(x,y,col),420);
  setTimeout(()=>addWave(x,y,'rgba(255,255,255,.5)'),640);
}
function drawFx(){
  fxX.clearRect(0,0,fxW,fxH);
  waves=waves.filter(w=>{
    w.r+=(w.max-w.r)*.1;w.life-=.018;
    if(w.life<=0)return false;
    fxX.save();
    fxX.beginPath();fxX.arc(w.x,w.y,w.r,0,Math.PI*2);
    fxX.strokeStyle=w.col;fxX.lineWidth=5*w.life;fxX.globalAlpha=w.life*.8;fxX.stroke();
    fxX.beginPath();fxX.arc(w.x,w.y,w.r*.62,0,Math.PI*2);
    fxX.strokeStyle='#fff';fxX.lineWidth=2*w.life;fxX.globalAlpha=w.life*.3;fxX.stroke();
    fxX.restore();return true;
  });
  fxPts=fxPts.filter(p=>{
    p.trail.unshift({x:p.x,y:p.y});if(p.trail.length>10)p.trail.pop();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.vx*=.97;p.life-=p.decay;
    if(p.life<=0)return false;
    for(let i=0;i<p.trail.length-1;i++){
      const a=(1-i/p.trail.length)*p.life*.6;
      fxX.save();fxX.globalAlpha=a;
      fxX.beginPath();fxX.moveTo(p.trail[i].x,p.trail[i].y);fxX.lineTo(p.trail[i+1].x,p.trail[i+1].y);
      fxX.strokeStyle=p.col;fxX.lineWidth=p.r*(1-i/p.trail.length)*p.life;fxX.stroke();fxX.restore();
    }
    fxX.save();fxX.globalAlpha=p.life;
    fxX.beginPath();fxX.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);fxX.fillStyle=p.col;fxX.fill();
    fxX.beginPath();fxX.arc(p.x,p.y,p.r*p.life*2.5,0,Math.PI*2);fxX.fillStyle=p.col+'33';fxX.fill();
    fxX.restore();return true;
  });
}

// ═══════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════
const ccC=document.getElementById('confettiCanvas'),ccX=ccC.getContext('2d');
let ccW=0,ccH=0,confetti=[],cfRaf;
function resizeCC(){ccW=ccC.width=innerWidth;ccH=ccC.height=innerHeight;}
resizeCC();addEventListener('resize',resizeCC);
function launchConfetti(mc){
  confetti=[];
  const pal=['#c8ff00','#cc88ff','#ffaa44','#44ddff','#fff','#ff44cc','#ff2255','#ffff00',mc];
  const sh=['rect','circle','ribbon','star','diamond'];
  for(let i=0;i<320;i++){
    confetti.push({
      x:Math.random()*ccW,y:-30-Math.random()*500,
      w:5+Math.random()*13,h:3+Math.random()*9,
      col:pal[Math.floor(Math.random()*pal.length)],sh:sh[Math.floor(Math.random()*sh.length)],
      vx:(Math.random()-.5)*7,vy:1+Math.random()*5,
      rot:Math.random()*360,rv:(Math.random()-.5)*14,
      wave:Math.random()*Math.PI*2,wa:15+Math.random()*35,ws:.015+Math.random()*.03,op:1
    });
  }
  cfAnim();
}
function star5(x,y,r,col,a){
  ccX.save();ccX.translate(x,y);ccX.globalAlpha=a;ccX.fillStyle=col;ccX.beginPath();
  for(let i=0;i<5;i++){const ag=(Math.PI*2/5)*i-Math.PI/2,b=ag+Math.PI/5;if(i===0)ccX.moveTo(Math.cos(ag)*r,Math.sin(ag)*r);else ccX.lineTo(Math.cos(ag)*r,Math.sin(ag)*r);ccX.lineTo(Math.cos(b)*r*.4,Math.sin(b)*r*.4);}
  ccX.closePath();ccX.fill();ccX.restore();
}
function cfAnim(){
  ccX.clearRect(0,0,ccW,ccH);
  confetti.forEach(p=>{
    p.wave+=p.ws;p.x+=p.vx+Math.sin(p.wave)*2.5;p.y+=p.vy;p.vy+=.09;p.rot+=p.rv;
    if(p.y>ccH*.78)p.op-=.022;if(p.op<=0)return;
    if(p.sh==='star'){star5(p.x,p.y,p.w,p.col,p.op);return;}
    ccX.save();ccX.translate(p.x,p.y);ccX.rotate(p.rot*Math.PI/180);ccX.globalAlpha=p.op;ccX.fillStyle=p.col;
    if(p.sh==='circle'){ccX.beginPath();ccX.arc(0,0,p.w/2,0,Math.PI*2);ccX.fill();}
    else if(p.sh==='rect'){ccX.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
    else if(p.sh==='ribbon'){ccX.beginPath();ccX.moveTo(-p.w/2,0);ccX.quadraticCurveTo(0,-p.h,p.w/2,0);ccX.quadraticCurveTo(0,p.h,-p.w/2,0);ccX.fill();}
    else if(p.sh==='diamond'){ccX.beginPath();ccX.moveTo(0,-p.h);ccX.lineTo(p.w/2,0);ccX.lineTo(0,p.h);ccX.lineTo(-p.w/2,0);ccX.closePath();ccX.fill();}
    ccX.restore();
  });
  confetti=confetti.filter(p=>p.op>0);
  if(confetti.length)cfRaf=requestAnimationFrame(cfAnim);else ccX.clearRect(0,0,ccW,ccH);
}
function stopConfetti(){cancelAnimationFrame(cfRaf);ccX.clearRect(0,0,ccW,ccH);confetti=[];}

// ═══════════════════════════════════════
// WHEEL DRAW
// ═══════════════════════════════════════
const wC=document.getElementById('wheelCanvas'),wX=wC.getContext('2d');
const S=900,CX=S/2,CY=S/2,R=S/2-8;
let angle=0,lastIdx=-1,glowCol='#fff',glowAmt=0;

function drawWheel(a){
  wX.clearRect(0,0,S,S);
  const n=SEG.length,arc=Math.PI*2/n;

  if(glowAmt>.01){
    const gg=wX.createRadialGradient(CX,CY,R*.65,CX,CY,R+60);
    gg.addColorStop(0,glowCol+'66');gg.addColorStop(1,'transparent');
    wX.save();wX.globalAlpha=glowAmt*.8;wX.beginPath();wX.arc(CX,CY,R+60,0,Math.PI*2);wX.fillStyle=gg;wX.fill();wX.restore();
  }

  SEG.forEach((s,i)=>{
    const st=a+i*arc,en=st+arc,mi=st+arc/2;
    wX.beginPath();wX.moveTo(CX,CY);wX.arc(CX,CY,R,st,en);wX.closePath();wX.fillStyle=s.color;wX.fill();
    const eg=wX.createRadialGradient(CX,CY,R*.2,CX,CY,R);
    eg.addColorStop(0,'rgba(255,255,255,.28)');eg.addColorStop(.7,'rgba(255,255,255,.04)');eg.addColorStop(1,'rgba(0,0,0,.2)');
    wX.beginPath();wX.moveTo(CX,CY);wX.arc(CX,CY,R,st,en);wX.closePath();wX.fillStyle=eg;wX.fill();
    wX.beginPath();wX.moveTo(CX,CY);wX.arc(CX,CY,R,st,en);wX.closePath();wX.strokeStyle='rgba(0,0,0,.4)';wX.lineWidth=4;wX.stroke();

    wX.save();wX.translate(CX,CY);wX.rotate(mi);
    wX.shadowColor='rgba(0,0,0,.55)';wX.shadowBlur=12;
    wX.font=`${Math.round(S*.112)}px serif`;wX.textAlign='center';wX.textBaseline='middle';
    wX.fillText(s.icon,R*.58,0);wX.shadowBlur=0;
    wX.font=`700 ${Math.round(S*.04)}px 'Poppins',sans-serif`;
    wX.fillStyle='rgba(0,0,0,.82)';wX.fillText(s.name,R*.2,0);
    wX.restore();
  });

  for(let i=0;i<n;i++){
    const ax=a+i*arc;
    wX.beginPath();wX.moveTo(CX,CY);wX.lineTo(CX+Math.cos(ax)*R,CY+Math.sin(ax)*R);
    wX.strokeStyle='rgba(0,0,0,.45)';wX.lineWidth=4;wX.stroke();
  }
  wX.beginPath();wX.arc(CX,CY,R,0,Math.PI*2);
  wX.strokeStyle='rgba(255,255,255,.38)';wX.lineWidth=9;wX.stroke();
  wX.strokeStyle='rgba(0,0,0,.3)';wX.lineWidth=4;wX.stroke();
}
drawWheel(0);

function getSegIdx(a){
  const n=SEG.length,arc=Math.PI*2/n;
  return Math.floor((((-a-Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2))/arc)%n;
}
function getWinner(a){const i=getSegIdx(a);return {seg:SEG[i],idx:i};}

function doTick(){
  const p=document.getElementById('pointer');
  p.classList.remove('tick');void p.offsetWidth;p.classList.add('tick');
  setTimeout(()=>p.classList.remove('tick'),110);
}

// ═══════════════════════════════════════
// SPIN STATE
// ═══════════════════════════════════════
let spinning=false;
let velocity=0;        // rad/frame — used by both drag and auto
let rafId=null;

function updateTick(){
  const idx=getSegIdx(angle);
  if(idx!==lastIdx){lastIdx=idx;doTick();glowCol=SEG[idx].color;glowAmt=.6;}
  else glowAmt*=.88;
}

// ═══════════════════════════════════════
// INERTIA LOOP  (runs after drag release OR auto spin)
// ═══════════════════════════════════════
const FRICTION=0.978;   // how fast it slows down
const MIN_VEL=0.002;    // stop threshold

function startInertia(){
  if(rafId)cancelAnimationFrame(rafId);
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('rays').classList.add('active');

  function frame(){
    velocity*=FRICTION;
    angle+=velocity;
    updateTick();
    drawWheel(angle);

    if(Math.abs(velocity)>MIN_VEL){
      rafId=requestAnimationFrame(frame);
    } else {
      velocity=0;spinning=false;
      glowAmt=0;
      document.getElementById('rays').classList.remove('active');
      const {seg}=getWinner(angle);
      triggerStop(seg);
    }
  }
  rafId=requestAnimationFrame(frame);
}

// ═══════════════════════════════════════
// AUTO SPIN (button)
// ═══════════════════════════════════════
function spinAuto(){
  if(spinning)return;
  velocity=(4+Math.random()*3)*0.08; // big initial velocity
  startInertia();
}

// ═══════════════════════════════════════
// DRAG / TOUCH
// ═══════════════════════════════════════
const wrapper=document.getElementById('wheelWrapper');
let dragging=false;
let lastAngleDrag=0;
let prevAngleDrag=0;
let prevTime=0;
let dragVel=0;

function getPointerAngle(e){
  const rect=wrapper.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  return Math.atan2(clientY-cy, clientX-cx);
}

function onDragStart(e){
  if(spinning)return;
  e.preventDefault();
  dragging=true;
  if(rafId)cancelAnimationFrame(rafId);
  lastAngleDrag=getPointerAngle(e);
  prevAngleDrag=lastAngleDrag;
  prevTime=performance.now();
  dragVel=0;
  document.getElementById('rays').classList.add('active');
}

function onDragMove(e){
  if(!dragging)return;
  e.preventDefault();
  const now=performance.now();
  const cur=getPointerAngle(e);
  let delta=cur-lastAngleDrag;
  // wrap around ±π
  if(delta>Math.PI)delta-=Math.PI*2;
  if(delta<-Math.PI)delta+=Math.PI*2;
  angle+=delta;
  lastAngleDrag=cur;

  const dt=now-prevTime;
  if(dt>0){
    const rawVel=(cur-prevAngleDrag)/dt*16; // per frame at 60fps
    if(Math.abs(rawVel-dragVel)<0.3)dragVel=dragVel*.6+rawVel*.4; // smooth
    else dragVel=rawVel;
    prevAngleDrag=cur;prevTime=now;
  }

  updateTick();
  drawWheel(angle);
}

function onDragEnd(e){
  if(!dragging)return;
  dragging=false;
  document.getElementById('rays').classList.remove('active');

  // need enough velocity to trigger spin
  if(Math.abs(dragVel)>0.005){
    velocity=Math.max(-0.5,Math.min(0.5,dragVel)); // cap velocity
    startInertia();
  } else {
    glowAmt=0;drawWheel(angle);
  }
}

// Pointer events (works for mouse + touch + Apple Pencil)
wrapper.addEventListener('pointerdown', onDragStart, {passive:false});
window.addEventListener('pointermove',  onDragMove,  {passive:false});
window.addEventListener('pointerup',    onDragEnd,   {passive:false});
wrapper.addEventListener('touchstart',  onDragStart, {passive:false});
window.addEventListener('touchmove',    onDragMove,  {passive:false});
window.addEventListener('touchend',     onDragEnd,   {passive:false});

// ═══════════════════════════════════════
// STOP EFFECTS
// ═══════════════════════════════════════
function triggerStop(seg){
  const fl=document.getElementById('flash');
  fl.style.background=seg.color;fl.style.opacity='.4';
  setTimeout(()=>fl.style.opacity='0',130);

  document.body.classList.remove('shaking');void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'),500);

  const wr=wC.getBoundingClientRect();
  const wcx=wr.left+wr.width/2,wcy=wr.top+wr.height/2;
  spawnRings(wcx,wcy,seg.color);
  spawnSparks(wcx,wcy,seg.color,90);
  spawnSparks(wcx,wcy,'#fff',35);
  setTimeout(()=>{spawnStars(wcx,wcy-80,seg.color,55);spawnStars(wcx,wcy,seg.color+'bb',30);},260);
  setTimeout(()=>{spawnStars(fxW*.12,fxH*.25,seg.color);spawnStars(fxW*.88,fxH*.25,'#fff');},520);
  setTimeout(()=>spawnStars(fxW*.5,fxH*.1,seg.color),780);
  setTimeout(()=>showResult(seg),850);
}

// ═══════════════════════════════════════
// RESULT
// ═══════════════════════════════════════
let orbitRaf;
function showResult(seg){
  document.getElementById('resultIcon').textContent=seg.icon;
  document.getElementById('resultName').textContent=seg.name;
  document.getElementById('resultSub').textContent=seg.desc;
  document.getElementById('resultIconBg').style.cssText=`background:${seg.color}44;box-shadow:0 0 70px ${seg.color}99,0 0 140px ${seg.color}44`;
  document.getElementById('resultName').style.textShadow=`0 0 30px ${seg.color},0 0 60px ${seg.color}88`;
  document.getElementById('resultCard').style.setProperty('--cc',seg.color);

  cancelAnimationFrame(orbitRaf);
  const oc=document.getElementById('orbitCanvas'),ox=oc.getContext('2d');
  const OW=174,OC=OW/2,OR=78;let t=0;
  function ofr(){
    oc.width=OW;ox.clearRect(0,0,OW,OW);t+=.04;
    for(let i=0;i<8;i++){
      const a=t+(Math.PI*2/8)*i,x=OC+Math.cos(a)*OR,y=OC+Math.sin(a)*OR;
      const r=2.5+2*Math.abs(Math.sin(t*1.5+i));
      ox.save();ox.globalAlpha=.55+.45*Math.abs(Math.sin(t+i));
      ox.beginPath();ox.arc(x,y,r,0,Math.PI*2);ox.fillStyle=seg.color;ox.fill();
      ox.beginPath();ox.arc(x,y,r*3,0,Math.PI*2);ox.fillStyle=seg.color+'44';ox.fill();
      ox.restore();
    }
    orbitRaf=requestAnimationFrame(ofr);
  }
  ofr();

  const card=document.getElementById('resultCard');
  card.style.animation='none';void card.offsetWidth;card.style.animation='';
  document.getElementById('resultOverlay').classList.add('show');
  launchConfetti(seg.color);
}

function closeResult(){
  cancelAnimationFrame(orbitRaf);
  document.getElementById('resultOverlay').classList.remove('show');
  stopConfetti();
  document.getElementById('spinBtn').disabled=false;
}

// ═══════════════════════════════════════
// MASTER LOOP
// ═══════════════════════════════════════
function loop(t){drawBg(t);drawFx();requestAnimationFrame(loop);}
requestAnimationFrame(loop);

  const sw=`const C='ruleta-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match('./')))))`;
  const url=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{});
}
