<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gira la Ruleta</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --tierra: #c8ff00;
  --aire:   #cc88ff;
  --fuego:  #ffaa44;
  --agua:   #44ddff;
}
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Poppins',sans-serif; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; position:relative; }

#bgCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#fxCanvas, #confettiCanvas { position:fixed; inset:0; pointer-events:none; }
#fxCanvas { z-index:2; }
#confettiCanvas { z-index:3; }
#flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:10; transition:opacity 0.05s; }

.page { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:0; }

.wheel-wrapper { position:relative; width:min(360px,88vw); height:min(360px,88vw); margin-bottom:36px; }

.rays {
  position:absolute; inset:-20px; border-radius:50%;
  background:conic-gradient(
    rgba(200,255,0,0.18) 0deg, rgba(0,0,0,0) 45deg,
    rgba(204,136,255,0.18) 90deg, rgba(0,0,0,0) 135deg,
    rgba(255,170,68,0.18) 180deg, rgba(0,0,0,0) 225deg,
    rgba(68,221,255,0.18) 270deg, rgba(0,0,0,0) 315deg,
    rgba(200,255,0,0.18) 360deg
  );
  opacity:0; transition:opacity 0.4s;
  animation:raysRot 3s linear infinite; pointer-events:none; z-index:-1;
}
.rays.active { opacity:1; }
@keyframes raysRot { from{transform:rotate(0)} to{transform:rotate(360deg)} }

.wheel-glow { position:absolute; inset:-8px; border-radius:50%; border:3px solid rgba(255,255,255,0.12); pointer-events:none; animation:ringPulse 2.5s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.05)} 50%{box-shadow:0 0 70px rgba(255,255,255,0.2)} }

#wheelCanvas { width:100%; height:100%; border-radius:50%; }

.pointer {
  position:absolute; top:-30px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:18px solid transparent; border-right:18px solid transparent; border-top:38px solid #fff;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.9)); z-index:10;
  animation:pointerBob 1.8s ease-in-out infinite;
}
@keyframes pointerBob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
.pointer.tick { filter:drop-shadow(0 0 24px #fff) drop-shadow(0 0 8px #ffaa44) !important; transform:translateX(-50%) scale(1.3) !important; transition:transform 0.05s; }

.center-dot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; background:#fff; border-radius:50%; z-index:10; animation:dotPulse 1.5s ease-in-out infinite; box-shadow:0 0 20px rgba(255,255,255,0.9),0 0 50px rgba(255,255,255,0.4); }
@keyframes dotPulse { 0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.9),0 0 50px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 35px rgba(255,255,255,1),0 0 90px rgba(255,255,255,0.6)} }

.spin-btn {
  position:relative; padding:18px 64px; border:none; border-radius:100px;
  font-family:'Poppins',sans-serif; font-size:1.1rem; font-weight:400; color:#000;
  cursor:pointer; letter-spacing:0.04em; overflow:hidden;
  background:linear-gradient(135deg,var(--tierra) 0%,var(--agua) 33%,var(--aire) 66%,var(--fuego) 100%);
  background-size:300% 300%; animation:gradShift 4s ease infinite;
  transition:transform 0.2s, box-shadow 0.2s;
}
.spin-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.55) 50%,transparent 70%); background-size:200% 100%; background-position:200% 0; transition:background-position 0.5s; }
.spin-btn:hover::after { background-position:-200% 0; }
@keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.spin-btn:hover:not(:disabled) { transform:scale(1.08) translateY(-3px); box-shadow:0 14px 50px rgba(200,255,0,0.55); }
.spin-btn:active:not(:disabled) { transform:scale(0.96); }
.spin-btn:disabled { opacity:0.4; cursor:not-allowed; animation:none; }

.legend { display:flex; gap:18px; margin-top:30px; flex-wrap:wrap; justify-content:center; }
.legend-item { display:flex; align-items:center; gap:8px; color:rgba(255,255,255,0.5); font-size:0.78rem; font-weight:300; letter-spacing:0.05em; transition:color 0.3s; }
.legend-item:hover { color:#fff; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

#resultOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(14px); }
#resultOverlay.show { display:flex; }

.result-card {
  position:relative; display:flex; flex-direction:column; align-items:center; gap:14px;
  padding:48px 64px; border-radius:32px; background:rgba(8,8,8,0.92);
  animation:cardPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; overflow:hidden;
}
.result-card::before {
  content:''; position:absolute; inset:-3px; border-radius:35px; z-index:-1;
  background:conic-gradient(var(--cc,#fff) 0deg,transparent 60deg,transparent 150deg,var(--cc,#fff) 210deg,transparent 270deg,transparent 360deg);
  animation:borderSpin 1.8s linear infinite;
}
.result-card::after { content:''; position:absolute; inset:0; border-radius:32px; background:rgba(8,8,8,0.92); z-index:-1; }
@keyframes borderSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes cardPop { from{opacity:0;transform:scale(0.25) rotate(-15deg)} to{opacity:1;transform:scale(1) rotate(0)} }

.result-icon-wrap { position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; }
.result-icon-bg { position:absolute; inset:0; border-radius:50%; animation:ibPulse 1s ease-in-out infinite alternate; }
@keyframes ibPulse { from{opacity:0.3;transform:scale(0.88)} to{opacity:0.75;transform:scale(1.12)} }
#resultIcon { position:relative; font-size:5.5rem; z-index:1; animation:iconBounce 0.7s cubic-bezier(0.175,0.885,0.32,1.275) 0.1s both,iconFloat 2s 0.8s ease-in-out infinite; }
@keyframes iconBounce { from{opacity:0;transform:scale(0) rotate(-25deg)} to{opacity:1;transform:scale(1) rotate(0)} }
@keyframes iconFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-14px) scale(1.1)} }

.orbit-ring { position:absolute; inset:-12px; border-radius:50%; animation:orbitSpin 3s linear infinite; }
@keyframes orbitSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

.result-element-name { font-size:2.8rem; font-weight:700; color:#fff; letter-spacing:0.05em; animation:textUp 0.5s 0.3s both; }
.result-element-sub { font-size:0.85rem; font-weight:300; color:rgba(255,255,255,0.45); letter-spacing:0.2em; text-transform:uppercase; animation:textUp 0.5s 0.45s both; }
@keyframes textUp { from{opacity:0;transform:translateY(24px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }

.result-close { margin-top:10px; padding:12px 36px; border:1px solid rgba(255,255,255,0.2); border-radius:100px; background:transparent; color:#fff; font-family:'Poppins',sans-serif; font-weight:400; font-size:0.95rem; cursor:pointer; letter-spacing:0.05em; transition:background 0.2s,border-color 0.2s,transform 0.1s; animation:textUp 0.5s 0.6s both; }
.result-close:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.5); transform:scale(1.04); }

@keyframes shake { 0%{transform:translate(0,0)} 15%{transform:translate(-8px,5px)} 30%{transform:translate(8px,-5px)} 45%{transform:translate(-6px,4px)} 60%{transform:translate(6px,-3px)} 75%{transform:translate(-3px,2px)} 90%{transform:translate(3px,-1px)} 100%{transform:translate(0,0)} }
.shaking { animation:shake 0.5s ease both; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>
<div id="flash"></div>

<div class="page">
  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="rays" id="rays"></div>
    <div class="wheel-glow"></div>
    <div class="pointer" id="pointer"></div>
    <canvas id="wheelCanvas" width="720" height="720"></canvas>
    <div class="center-dot"></div>
  </div>
  <div class="btn-wrap">
    <button class="spin-btn" id="spinBtn" onclick="spin()">Gira la ruleta</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c8ff00;box-shadow:0 0 6px #c8ff00"></div>Tierra</div>
    <div class="legend-item"><div class="legend-dot" style="background:#cc88ff;box-shadow:0 0 6px #cc88ff"></div>Aire</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffaa44;box-shadow:0 0 6px #ffaa44"></div>Fuego</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44ddff;box-shadow:0 0 6px #44ddff"></div>Agua</div>
  </div>
</div>

<div id="resultOverlay">
  <div class="result-card" id="resultCard">
    <div class="result-icon-wrap">
      <div class="result-icon-bg" id="resultIconBg"></div>
      <canvas class="orbit-ring" id="orbitCanvas" width="184" height="184"></canvas>
      <span id="resultIcon">🌿</span>
    </div>
    <div class="result-element-name" id="resultName">Tierra</div>
    <div class="result-element-sub" id="resultSub">Elemento de la naturaleza</div>
    <button class="result-close" onclick="closeResult()">¡Volver a girar!</button>
  </div>
</div>

<script>
// ── SEGMENTS ──────────────────────────────────────
const SEG = [
  {name:'Tierra',color:'#c8ff00',icon:'🌿',desc:'Elemento de la naturaleza'},
  {name:'Aire',  color:'#cc88ff',icon:'🌬️',desc:'Elemento del viento libre'},
  {name:'Fuego', color:'#ffaa44',icon:'🔥',desc:'Elemento de la pasión'},
  {name:'Agua',  color:'#44ddff',icon:'💧',desc:'Elemento de la fluidez'},
];

// ── BACKGROUND PARTICLES ──────────────────────────
const bgC=document.getElementById('bgCanvas'), bgX=bgC.getContext('2d');
let bgW=0,bgH=0;
const BGCOLS=['#c8ff0040','#cc88ff40','#ffaa4440','#44ddff40','#ffffff28'];
const bgPts=Array.from({length:100},()=>({
  x:Math.random()*3000,y:Math.random()*1500,
  r:0.4+Math.random()*2.8,
  vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,
  col:BGCOLS[Math.floor(Math.random()*BGCOLS.length)],
  ph:Math.random()*Math.PI*2,spd:.3+Math.random()*1.2,
}));
function resizeBg(){bgW=bgC.width=innerWidth;bgH=bgC.height=innerHeight;}
resizeBg(); addEventListener('resize',resizeBg);

function drawBg(t){
  bgX.clearRect(0,0,bgW,bgH);
  bgPts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=bgW; if(p.x>bgW)p.x=0;
    if(p.y<0)p.y=bgH; if(p.y>bgH)p.y=0;
    const a=.2+.8*Math.abs(Math.sin(t*.001*p.spd+p.ph));
    bgX.save();
    bgX.globalAlpha=a;
    bgX.beginPath(); bgX.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgX.fillStyle=p.col; bgX.fill();
    // tiny glow
    bgX.globalAlpha=a*.3;
    bgX.beginPath(); bgX.arc(p.x,p.y,p.r*3,0,Math.PI*2);
    bgX.fillStyle=p.col; bgX.fill();
    bgX.restore();
  });
}

// ── FX CANVAS ─────────────────────────────────────
const fxC=document.getElementById('fxCanvas'),fxX=fxC.getContext('2d');
let fxW=0,fxH=0, fxPts=[], waves=[];
function resizeFx(){fxW=fxC.width=innerWidth;fxH=fxC.height=innerHeight;}
resizeFx(); addEventListener('resize',resizeFx);

function addWave(x,y,col){waves.push({x,y,r:0,max:Math.min(fxW,fxH)*.6,col,life:1});}

function spawnSparks(x,y,col,n=70){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*12;
    fxPts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:1.5+Math.random()*4,col,life:1,decay:.012+Math.random()*.022,trail:[],type:'spark'});
  }
}

function spawnStars(x,y,col,n=50){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i, sp=3+Math.random()*9;
    fxPts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:2+Math.random()*4,col,life:1,decay:.008+Math.random()*.014,trail:[],type:'star'});
  }
}

function spawnRings(x,y,col){
  addWave(x,y,col);
  setTimeout(()=>addWave(x,y,'#fff'),200);
  setTimeout(()=>addWave(x,y,col),400);
  setTimeout(()=>addWave(x,y,'rgba(255,255,255,0.5)'),600);
}

function drawFx(){
  fxX.clearRect(0,0,fxW,fxH);
  // shockwaves
  waves=waves.filter(w=>{
    w.r+=(w.max-w.r)*.1; w.life-=.018;
    if(w.life<=0)return false;
    fxX.save();
    fxX.beginPath(); fxX.arc(w.x,w.y,w.r,0,Math.PI*2);
    fxX.strokeStyle=w.col; fxX.lineWidth=5*w.life; fxX.globalAlpha=w.life*.8; fxX.stroke();
    fxX.beginPath(); fxX.arc(w.x,w.y,w.r*.65,0,Math.PI*2);
    fxX.strokeStyle='#fff'; fxX.lineWidth=2*w.life; fxX.globalAlpha=w.life*.35; fxX.stroke();
    fxX.restore();
    return true;
  });
  // particles
  fxPts=fxPts.filter(p=>{
    p.trail.unshift({x:p.x,y:p.y});
    if(p.trail.length>10)p.trail.pop();
    p.x+=p.vx; p.y+=p.vy; p.vy+=.22; p.vx*=.97;
    p.life-=p.decay;
    if(p.life<=0)return false;
    // trail
    for(let i=0;i<p.trail.length-1;i++){
      const a=(1-i/p.trail.length)*p.life*.6;
      fxX.save(); fxX.globalAlpha=a;
      fxX.beginPath(); fxX.moveTo(p.trail[i].x,p.trail[i].y); fxX.lineTo(p.trail[i+1].x,p.trail[i+1].y);
      fxX.strokeStyle=p.col; fxX.lineWidth=p.r*(1-i/p.trail.length)*p.life; fxX.stroke();
      fxX.restore();
    }
    fxX.save(); fxX.globalAlpha=p.life;
    fxX.beginPath(); fxX.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); fxX.fillStyle=p.col; fxX.fill();
    fxX.beginPath(); fxX.arc(p.x,p.y,p.r*p.life*2.5,0,Math.PI*2); fxX.fillStyle=p.col+'33'; fxX.fill();
    fxX.restore();
    return true;
  });
}

// ── CONFETTI ──────────────────────────────────────
const ccC=document.getElementById('confettiCanvas'),ccX=ccC.getContext('2d');
let ccW=0,ccH=0,confetti=[],cfRaf;
function resizeCC(){ccW=ccC.width=innerWidth;ccH=ccC.height=innerHeight;}
resizeCC(); addEventListener('resize',resizeCC);

function launchConfetti(mc){
  confetti=[];
  const pal=['#c8ff00','#cc88ff','#ffaa44','#44ddff','#fff','#ff44cc','#ff2255','#ffff00',mc];
  const sh=['rect','circle','ribbon','star','diamond'];
  for(let i=0;i<320;i++){
    confetti.push({
      x:Math.random()*ccW, y:-30-Math.random()*500,
      w:5+Math.random()*13, h:3+Math.random()*9,
      col:pal[Math.floor(Math.random()*pal.length)],
      sh:sh[Math.floor(Math.random()*sh.length)],
      vx:(Math.random()-.5)*7, vy:1+Math.random()*5,
      rot:Math.random()*360, rv:(Math.random()-.5)*14,
      wave:Math.random()*Math.PI*2, wa:15+Math.random()*35, ws:.015+Math.random()*.03,
      op:1,
    });
  }
  cfAnim();
}

function star5(x,y,r,col,a){
  ccX.save(); ccX.translate(x,y); ccX.globalAlpha=a; ccX.fillStyle=col;
  ccX.beginPath();
  for(let i=0;i<5;i++){
    const ang=(Math.PI*2/5)*i-Math.PI/2, ang2=ang+Math.PI/5;
    if(i===0)ccX.moveTo(Math.cos(ang)*r,Math.sin(ang)*r); else ccX.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    ccX.lineTo(Math.cos(ang2)*r*.4,Math.sin(ang2)*r*.4);
  }
  ccX.closePath(); ccX.fill(); ccX.restore();
}

function cfAnim(){
  ccX.clearRect(0,0,ccW,ccH);
  confetti.forEach(p=>{
    p.wave+=p.ws; p.x+=p.vx+Math.sin(p.wave)*2.5; p.y+=p.vy; p.vy+=.09; p.rot+=p.rv;
    if(p.y>ccH*.78)p.op-=.022;
    if(p.op<=0)return;
    if(p.sh==='star'){ star5(p.x,p.y,p.w,p.col,p.op); return; }
    ccX.save(); ccX.translate(p.x,p.y); ccX.rotate(p.rot*Math.PI/180); ccX.globalAlpha=p.op; ccX.fillStyle=p.col;
    if(p.sh==='circle'){ ccX.beginPath(); ccX.arc(0,0,p.w/2,0,Math.PI*2); ccX.fill(); }
    else if(p.sh==='rect'){ ccX.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
    else if(p.sh==='ribbon'){ ccX.beginPath(); ccX.moveTo(-p.w/2,0); ccX.quadraticCurveTo(0,-p.h,p.w/2,0); ccX.quadraticCurveTo(0,p.h,-p.w/2,0); ccX.fill(); }
    else if(p.sh==='diamond'){ ccX.beginPath(); ccX.moveTo(0,-p.h); ccX.lineTo(p.w/2,0); ccX.lineTo(0,p.h); ccX.lineTo(-p.w/2,0); ccX.closePath(); ccX.fill(); }
    ccX.restore();
  });
  confetti=confetti.filter(p=>p.op>0);
  if(confetti.length)cfRaf=requestAnimationFrame(cfAnim); else ccX.clearRect(0,0,ccW,ccH);
}
function stopConfetti(){ cancelAnimationFrame(cfRaf); ccX.clearRect(0,0,ccW,ccH); confetti=[]; }

// ── WHEEL ─────────────────────────────────────────
const wC=document.getElementById('wheelCanvas'), wX=wC.getContext('2d');
const S=720,CX=S/2,CY=S/2,R=S/2-6;
let angle=0, spinning=false, lastIdx=-1, glowCol='#fff', glowAmt=0;

function drawWheel(a){
  wX.clearRect(0,0,S,S);
  const n=SEG.length, arc=Math.PI*2/n;

  if(glowAmt>.01){
    const gg=wX.createRadialGradient(CX,CY,R*.7,CX,CY,R+50);
    gg.addColorStop(0,glowCol+'66'); gg.addColorStop(1,'transparent');
    wX.save(); wX.globalAlpha=glowAmt*.8;
    wX.beginPath(); wX.arc(CX,CY,R+50,0,Math.PI*2); wX.fillStyle=gg; wX.fill();
    wX.restore();
  }

  SEG.forEach((s,i)=>{
    const st=a+i*arc, en=st+arc, mi=st+arc/2;
    wX.beginPath(); wX.moveTo(CX,CY); wX.arc(CX,CY,R,st,en); wX.closePath();
    wX.fillStyle=s.color; wX.fill();

    const eg=wX.createRadialGradient(CX,CY,R*.25,CX,CY,R);
    eg.addColorStop(0,'rgba(255,255,255,0.25)'); eg.addColorStop(.75,'rgba(255,255,255,0.04)'); eg.addColorStop(1,'rgba(0,0,0,0.18)');
    wX.beginPath(); wX.moveTo(CX,CY); wX.arc(CX,CY,R,st,en); wX.closePath(); wX.fillStyle=eg; wX.fill();

    wX.beginPath(); wX.moveTo(CX,CY); wX.arc(CX,CY,R,st,en); wX.closePath();
    wX.strokeStyle='rgba(0,0,0,0.4)'; wX.lineWidth=4; wX.stroke();

    wX.save(); wX.translate(CX,CY); wX.rotate(mi);
    wX.shadowColor='rgba(0,0,0,0.5)'; wX.shadowBlur=10;
    wX.font=`${Math.round(S*.108)}px serif`; wX.textAlign='center'; wX.textBaseline='middle';
    wX.fillText(s.icon,R*.58,0);
    wX.shadowBlur=0;
    wX.font=`700 ${Math.round(S*.039)}px 'Poppins',sans-serif`;
    wX.fillStyle='rgba(0,0,0,0.82)'; wX.fillText(s.name,R*.21,0);
    wX.restore();
  });

  for(let i=0;i<n;i++){
    const ax=a+i*arc;
    wX.beginPath(); wX.moveTo(CX,CY); wX.lineTo(CX+Math.cos(ax)*R,CY+Math.sin(ax)*R);
    wX.strokeStyle='rgba(0,0,0,0.45)'; wX.lineWidth=3.5; wX.stroke();
  }
  wX.beginPath(); wX.arc(CX,CY,R,0,Math.PI*2);
  wX.strokeStyle='rgba(255,255,255,0.35)'; wX.lineWidth=8; wX.stroke();
  wX.strokeStyle='rgba(0,0,0,0.3)'; wX.lineWidth=3; wX.stroke();
}
drawWheel(0);

function getWinner(a){
  const n=SEG.length, arc=Math.PI*2/n;
  const norm=((-a-Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  const i=Math.floor(norm/arc)%n;
  return {seg:SEG[i],idx:i};
}

function getIdx(a){
  const n=SEG.length, arc=Math.PI*2/n;
  return Math.floor((((-a-Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2))/arc)%n;
}

// ── POINTER TICK ─────────────────────────────────
function doTick(){
  const p=document.getElementById('pointer');
  p.classList.remove('tick'); void p.offsetWidth; p.classList.add('tick');
  setTimeout(()=>p.classList.remove('tick'),100);
}

// ── SPIN ─────────────────────────────────────────
function spin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('rays').classList.add('active');

  const total=(6+Math.random()*6)*Math.PI*2+Math.random()*Math.PI*2;
  const dur=3800+Math.random()*1600;
  const from=angle, to=from+total, t0=performance.now();
  function ease(t){return 1-Math.pow(1-t,4);}

  function frame(now){
    const p=Math.min((now-t0)/dur,1);
    angle=from+(to-from)*ease(p);
    const idx=getIdx(angle);
    if(idx!==lastIdx){
      lastIdx=idx;
      doTick();
      glowCol=SEG[idx].color; glowAmt=.5+ease(p)*.5;
    } else { glowAmt*=.88; }
    drawWheel(angle);
    if(p<1){ requestAnimationFrame(frame); }
    else {
      glowAmt=0; spinning=false;
      document.getElementById('rays').classList.remove('active');
      const {seg}=getWinner(angle);
      triggerStop(seg);
    }
  }
  requestAnimationFrame(frame);
}

// ── STOP EFFECTS ─────────────────────────────────
function triggerStop(seg){
  const fl=document.getElementById('flash');
  fl.style.background=seg.color; fl.style.opacity='.4';
  setTimeout(()=>fl.style.opacity='0',130);

  document.body.classList.remove('shaking'); void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'),500);

  const wr=document.getElementById('wheelCanvas').getBoundingClientRect();
  const wcx=wr.left+wr.width/2, wcy=wr.top+wr.height/2;

  spawnRings(wcx,wcy,seg.color);
  spawnSparks(wcx,wcy,seg.color,90);
  spawnSparks(wcx,wcy,'#fff',35);
  setTimeout(()=>{ spawnStars(wcx,wcy-80,seg.color,50); spawnStars(wcx,wcy,seg.color+'bb',30); },250);
  setTimeout(()=>{ spawnStars(fxW*.12,fxH*.25,seg.color); spawnStars(fxW*.88,fxH*.25,'#fff'); },500);
  setTimeout(()=>{ spawnStars(fxW*.5,fxH*.1,seg.color); },750);

  setTimeout(()=>showResult(seg),800);
}

// ── RESULT ───────────────────────────────────────
let orbitRaf;
function showResult(seg){
  document.getElementById('resultIcon').textContent=seg.icon;
  document.getElementById('resultName').textContent=seg.name;
  document.getElementById('resultSub').textContent=seg.desc;
  document.getElementById('resultIconBg').style.cssText=`background:${seg.color}44;box-shadow:0 0 70px ${seg.color}99,0 0 140px ${seg.color}44`;
  document.getElementById('resultName').style.textShadow=`0 0 30px ${seg.color},0 0 60px ${seg.color}88`;
  document.getElementById('resultCard').style.setProperty('--cc',seg.color);

  // orbit
  cancelAnimationFrame(orbitRaf);
  const oc=document.getElementById('orbitCanvas'), ox=oc.getContext('2d');
  const OW=184,OH=184,OCX=OW/2,OCY=OH/2,OR=84;
  let t=0;
  function ofr(){ oc.width=OW; // force clear
    ox.clearRect(0,0,OW,OH); t+=.04;
    for(let i=0;i<8;i++){
      const a=t+(Math.PI*2/8)*i;
      const x=OCX+Math.cos(a)*OR, y=OCY+Math.sin(a)*OR;
      const r=2.5+2*Math.abs(Math.sin(t*1.5+i));
      ox.save();
      ox.globalAlpha=.55+.45*Math.abs(Math.sin(t+i));
      ox.beginPath(); ox.arc(x,y,r,0,Math.PI*2); ox.fillStyle=seg.color; ox.fill();
      ox.beginPath(); ox.arc(x,y,r*3,0,Math.PI*2); ox.fillStyle=seg.color+'44'; ox.fill();
      ox.restore();
    }
    orbitRaf=requestAnimationFrame(ofr);
  }
  ofr();

  const card=document.getElementById('resultCard');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='';
  document.getElementById('resultOverlay').classList.add('show');
  launchConfetti(seg.color);
}

function closeResult(){
  cancelAnimationFrame(orbitRaf);
  document.getElementById('resultOverlay').classList.remove('show');
  stopConfetti();
  document.getElementById('spinBtn').disabled=false;
}

// ── MASTER LOOP ───────────────────────────────────
function loop(t){ drawBg(t); drawFx(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
